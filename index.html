<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <title>MVR Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #sidebar.open { transform: translateX(0); }
        #toast { transition: all 0.4s ease; transform: translateY(-150%); z-index: 9999; }
        #toast.show { transform: translateY(0); opacity: 1; }
        .btn-active:active { transform: scale(0.96); }
        /* Mobile-friendly chat height */
        #chat-messages { height: calc(100dvh - 200px); }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
        .balance-update { animation: pulse-blue 0.6s ease-out; }
    </style>
</head>
<body class="min-h-[100dvh] flex flex-col">

    <div id="toast" class="fixed top-4 left-4 right-4 mx-auto glass p-4 rounded-2xl flex items-center gap-3 border-l-4 border-blue-500 shadow-2xl opacity-0">
        <span class="text-xl">🔔</span>
        <p id="toast-msg" class="text-sm font-bold truncate text-slate-200"></p>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full w-full max-w-[320px] glass z-50 flex flex-col shadow-2xl">
        <div class="p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex p-1 bg-slate-900 rounded-xl gap-1">
                <button id="show-users" class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-blue-600 text-white transition-all">Live</button>
                <button id="show-chat" class="px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-slate-500 transition-all">Chat</button>
            </div>
            <button id="close-sidebar" class="w-10 h-10 flex items-center justify-center text-slate-500 text-3xl">&times;</button>
        </div>

        <div id="users-view" class="flex-1 p-6 space-y-4 overflow-y-auto">
            <div id="online-users-list" class="space-y-2"></div>
        </div>

        <div id="chat-view" class="flex-1 flex flex-col hidden overflow-hidden">
            <div id="chat-messages" class="flex-1 p-4 space-y-4 overflow-y-auto text-xs"></div>
            <div id="typing-indicator" class="px-5 py-1 h-5 text-[9px] text-blue-400 italic"></div>
            <div class="p-4 bg-slate-950/50 border-t border-white/5 flex gap-2">
                <input type="text" id="chat-input" placeholder="Say something..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-500 text-white">
                <button id="send-chat" class="bg-blue-600 px-5 rounded-xl text-white font-bold text-sm btn-active">Send</button>
            </div>
        </div>

        <button id="logout-btn" class="p-6 w-full bg-red-500/5 text-red-400/60 py-5 text-[10px] font-black uppercase tracking-[0.2em] border-t border-white/5">Sign Out</button>
    </div>

    <div id="auth-container" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] border-white/5">
            <div class="space-y-4">
                <div class="h-1 bg-blue-600 w-12 mx-auto rounded-full mb-8"></div>
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none focus:border-blue-500 text-white">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl outline-none focus:border-blue-500 text-white">
                <button id="login-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-900/20 btn-active">Sign In</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden flex-1 w-full max-w-md mx-auto p-5 flex flex-col">
        <div class="flex justify-end pt-2 mb-4">
            <button id="open-sidebar" class="relative w-12 h-12 glass rounded-2xl flex flex-col items-center justify-center gap-1.5 btn-active">
                <div id="unread-dot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-slate-950 hidden"></div>
                <div class="w-5 h-0.5 bg-slate-300"></div>
                <div class="w-5 h-0.5 bg-slate-300"></div>
            </button>
        </div>

        <div id="balance-card" class="glass p-10 rounded-[2.5rem] shadow-2xl mb-8 border-white/10 flex flex-col items-center justify-center text-center transition-all">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-2">Available Balance</p>
            <h2 id="total-balance" class="text-4xl font-black tracking-tighter text-white">0.00</h2>
        </div>

        <div class="space-y-4 mb-8">
            <div class="flex flex-col gap-3">
                <input type="text" id="desc" placeholder="Transaction Description" class="w-full p-4 bg-slate-900/40 border-b border-white/5 outline-none focus:border-blue-500 text-white text-center">
                <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="w-full p-4 bg-transparent text-center outline-none text-4xl font-black text-white">
            </div>
            <div class="flex gap-4 pt-4">
                <button id="add-income" class="flex-1 bg-blue-600 text-white font-bold py-5 rounded-[2rem] shadow-lg btn-active">Income</button>
                <button id="add-expense" class="flex-1 bg-white/5 border border-white/10 text-white font-bold py-5 rounded-[2rem] btn-active">Expense</button>
            </div>
        </div>

        <button id="toggle-history" class="w-full py-4 text-[10px] font-black uppercase tracking-widest text-slate-500">View History</button>
        
        <div id="history-content" class="hidden space-y-3 pb-10">
            <div id="transaction-list" class="space-y-3"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set, onDisconnect, query, limitToLast, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // UI Handlers
        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const usersView = document.getElementById('users-view'), chatView = document.getElementById('chat-view');
        const showU = document.getElementById('show-users'), showC = document.getElementById('show-chat');
        const historyBtn = document.getElementById('toggle-history'), historyContent = document.getElementById('history-content');

        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); document.getElementById('unread-dot').classList.add('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

        showU.onclick = () => { usersView.classList.remove('hidden'); chatView.classList.add('hidden'); showU.className = "px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-blue-600 text-white transition-all"; showC.className = "px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-slate-500 transition-all"; };
        showC.onclick = () => { chatView.classList.remove('hidden'); usersView.classList.add('hidden'); showC.className = "px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg bg-blue-600 text-white transition-all"; showU.className = "px-4 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg text-slate-500 transition-all"; const cb = document.getElementById('chat-messages'); cb.scrollTop = cb.scrollHeight; };

        historyBtn.onclick = () => { const h = historyContent.classList.toggle('hidden'); historyBtn.innerText = h ? 'View History' : 'Hide History'; };

        let firstLoad = true, currentBal = 0;

        // Auth Logic
        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                set(ref(db, `presence/${user.uid}`), { email: user.email, active: true });
                onDisconnect(ref(db, `presence/${user.uid}`)).remove();
                initSync();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        function initSync() {
            // Online Users
            onValue(ref(db, 'presence'), snap => {
                const list = document.getElementById('online-users-list'); list.innerHTML = '';
                Object.values(snap.val() || {}).forEach(u => {
                    list.innerHTML += `<div class="flex items-center gap-3 glass p-3 rounded-2xl"><div class="w-8 h-8 rounded-lg bg-blue-600/20 text-blue-400 flex items-center justify-center font-bold text-xs border border-blue-500/20">${u.email[0].toUpperCase()}</div><span class="text-xs font-bold text-slate-300">${u.email.split('@')[0]}</span><div class="ml-auto w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div></div>`;
                });
            });

            // Transactions & Notifications
            onValue(ref(db, 'shared_transactions'), snap => {
                const data = snap.val();
                const entries = data ? Object.entries(data).reverse() : [];
                let total = 0; entries.forEach(e => total += parseFloat(e[1].amount));
                
                if(!firstLoad && entries.length > 0 && entries[0][1].addedBy !== auth.currentUser.email) {
                    const t = document.getElementById('toast');
                    document.getElementById('toast-msg').innerText = `${entries[0][1].addedBy.split('@')[0]} added ${Math.abs(entries[0][1].amount)}`;
                    t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 4000);
                }
                
                if(total !== currentBal) {
                    document.getElementById('balance-card').classList.add('balance-update');
                    setTimeout(() => document.getElementById('balance-card').classList.remove('balance-update'), 600);
                }
                document.getElementById('total-balance').innerText = total.toLocaleString('en-MV', {minimumFractionDigits: 2});
                currentBal = total;
                renderHistory(entries);
            });

            // Chat with Typing Indicator
            const cin = document.getElementById('chat-input');
            cin.oninput = () => set(ref(db, `typing/${auth.currentUser.uid}`), { name: auth.currentUser.email.split('@')[0], active: cin.value.length > 0 });
            
            onValue(ref(db, 'typing'), snap => {
                const typers = Object.values(snap.val() || {}).filter(t => t.active && t.name !== auth.currentUser.email.split('@')[0]).map(t => t.name);
                document.getElementById('typing-indicator').innerText = typers.length ? `${typers.join(', ')} is typing...` : '';
            });

            onValue(query(ref(db, 'chat_messages'), limitToLast(50)), snap => {
                const box = document.getElementById('chat-messages'); box.innerHTML = '';
                const msgs = snap.val();
                if(msgs) {
                    Object.values(msgs).forEach(m => {
                        const isMe = m.user === auth.currentUser.email;
                        box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                            <span class="text-[8px] font-black text-slate-600 uppercase mb-1 px-1">${m.user.split('@')[0]}</span>
                            <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-200'} p-3 rounded-2xl max-w-[85%] shadow-sm">${m.text}</div>
                        </div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                    if(!firstLoad && !sidebar.classList.contains('open')) document.getElementById('unread-dot').classList.remove('hidden');
                }
                firstLoad = false;
            });
        }

        function renderHistory(entries) {
            const list = document.getElementById('transaction-list'); list.innerHTML = '';
            entries.forEach(([id, item]) => {
                list.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center"><div class="flex items-center gap-3"><div class="text-[8px] font-black ${item.amount > 0 ? 'text-green-500' : 'text-red-500'} bg-slate-900 w-8 h-8 rounded-lg flex items-center justify-center">${item.amount > 0 ? 'IN' : 'OT'}</div><div><p class="text-xs font-bold text-white">${item.desc}</p><p class="text-[8px] font-black text-slate-600 uppercase mt-0.5">${item.addedBy.split('@')[0]}</p></div></div><div class="text-right"><p class="text-xs font-black ${item.amount > 0 ? 'text-green-400' : 'text-white'}">${item.amount > 0 ? '+' : ''}${parseFloat(item.amount).toFixed(2)}</p><button onclick="window.del('${id}')" class="text-[8px] text-slate-700 font-black uppercase mt-1">Delete</button></div></div>`;
            });
        }

        // Actions
        document.getElementById('send-chat').onclick = () => {
            const cin = document.getElementById('chat-input');
            if(cin.value) push(ref(db, 'chat_messages'), { user: auth.currentUser.email, text: cin.value, time: serverTimestamp() });
            cin.value = ''; set(ref(db, `typing/${auth.currentUser.uid}`), { active: false });
        };

        const pushData = (isInc) => {
            const d = document.getElementById('desc'), a = document.getElementById('amount');
            if(!d.value || !a.value) return;
            push(ref(db, 'shared_transactions'), { desc: d.value, amount: isInc ? Math.abs(a.value) : -Math.abs(a.value), addedBy: auth.currentUser.email, time: serverTimestamp() });
            d.value = ''; a.value = '';
        };

        document.getElementById('add-income').onclick = () => pushData(true);
        document.getElementById('add-expense').onclick = () => pushData(false);
        window.del = (id) => confirm("Remove?") && remove(ref(db, `shared_transactions/${id}`));
    </script>
</body>
</html>
