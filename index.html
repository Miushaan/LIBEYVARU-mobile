<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MVR Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #000; color: #fff; height: 100dvh; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #sidebar { 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateX(100%); width: 90%; max-width: 380px;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); }
        
        .mega-amount { font-size: 6rem; line-height: 0.85; letter-spacing: -0.06em; font-weight: 900; transition: all 0.3s ease; }
        .label-text { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.5em; color: #334155; text-transform: uppercase; }

        /* Animation for saving */
        @keyframes flash-green { 0% { background: #000; } 50% { background: #064e3b; } 100% { background: #000; } }
        @keyframes flash-red { 0% { background: #000; } 50% { background: #450a0a; } 100% { background: #000; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .save-success-inc { animation: flash-green 0.6s ease-out; }
        .save-success-exp { animation: flash-red 0.6s ease-out; }
        .error-shake { animation: shake 0.3s ease-in-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.94); transition: 0.1s; }
        input { font-size: 18px !important; }
    </style>
</head>
<body id="main-body" class="flex flex-col">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/95 z-40 hidden backdrop-blur-xl"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full glass flex flex-col shadow-2xl">
        <div class="p-8 border-b border-white/5">
            <div class="flex justify-between items-center mb-8">
                <span class="label-text">Archive Control</span>
                <button id="close-sidebar" class="text-slate-600 text-4xl">&times;</button>
            </div>
            
            <div class="bg-blue-600/10 border border-blue-500/20 p-8 rounded-[2.5rem] text-center mb-6">
                <p class="label-text text-blue-500 mb-2">Net MVR</p>
                <h2 id="total-balance" class="text-4xl font-black tracking-tighter">0.00</h2>
            </div>

            <input type="text" id="search-history" placeholder="SEARCH ENTRIES..." 
                class="w-full bg-slate-900/50 border border-white/5 rounded-2xl p-4 text-[10px] font-black tracking-widest outline-none focus:border-blue-600">
        </div>

        <div class="flex-1 overflow-y-auto p-6 no-scrollbar">
            <div id="transaction-list" class="space-y-4"></div>
        </div>

        <div class="p-8 border-t border-white/5 flex justify-between items-center">
            <span id="user-display" class="text-[8px] font-black text-slate-700 uppercase"></span>
            <button id="logout-btn" class="text-[8px] font-black text-red-900/40 uppercase">Exit System</button>
        </div>
    </div>

    <div id="app-container" class="flex-1 flex flex-col hidden" style="padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);">
        <div class="p-8 flex justify-between items-center">
            <div class="flex gap-1"><div class="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div></div>
            <button id="open-sidebar" class="w-16 h-16 glass rounded-[2.2rem] flex items-center justify-center active-scale shadow-2xl">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M10 12h10M4 18h16" stroke-width="3" stroke-linecap="round"/></svg>
            </button>
        </div>

        <div class="flex-1 flex flex-col justify-center px-10 space-y-16">
            <div class="space-y-4">
                <p class="label-text text-center">Reference Label</p>
                <input type="text" id="desc" placeholder="TAP TO DESCRIBE" 
                    class="w-full bg-transparent border-b-2 border-slate-900 py-4 text-center text-2xl font-black uppercase tracking-widest text-white outline-none focus:border-blue-600 transition-all">
            </div>

            <div id="amount-container" class="space-y-4 transition-transform">
                <p class="label-text text-center">Amount MVR</p>
                <input type="text" id="amount" inputmode="decimal" placeholder="0" 
                    class="w-full bg-transparent text-center mega-amount text-white outline-none caret-blue-600">
            </div>

            <div class="grid grid-cols-1 gap-6">
                <button id="add-income" class="w-full bg-blue-600 h-28 rounded-[2.5rem] font-black text-xl uppercase tracking-[0.3em] active-scale shadow-2xl shadow-blue-900/40">
                    (+) INCOME
                </button>
                <button id="add-expense" class="w-full glass h-28 rounded-[2.5rem] font-black text-xl uppercase tracking-[0.3em] active-scale">
                    (-) EXPENSE
                </button>
            </div>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 flex items-center justify-center p-10 bg-black z-[100]">
        <div class="w-full max-w-sm space-y-10 text-center">
            <h1 class="text-5xl font-black tracking-tighter text-blue-600 italic">MVR<span class="text-white">.</span></h1>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="ACCESS EMAIL" class="w-full p-6 bg-slate-900/50 rounded-3xl border border-slate-800 text-white font-bold outline-none">
                <input type="password" id="password" placeholder="PASSWORD" class="w-full p-6 bg-slate-900/50 rounded-3xl border border-slate-800 text-white font-bold outline-none">
            </div>
            <button id="login-btn" class="w-full bg-white text-black py-7 rounded-[2rem] font-black uppercase tracking-widest active-scale">Unlock Terminal</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const amountInput = document.getElementById('amount');
        const descInput = document.getElementById('desc');
        const mainBody = document.getElementById('main-body');
        const searchInput = document.getElementById('search-history');
        let fullData = [];

        // ENTER KEY NAVIGATION
        descInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); amountInput.focus(); } });
        amountInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); pushTrans(true); } });

        // COMMA FORMATTER
        amountInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/,/g, '');
            if (!isNaN(value) && value !== "") { e.target.value = Number(value).toLocaleString('en-US'); }
        });

        // SEARCH LOGIC
        searchInput.addEventListener('input', () => renderHistory(fullData));

        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email;
                syncData();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function syncData() {
            onValue(ref(db, 'shared_transactions'), s => {
                const data = s.val();
                fullData = data ? Object.entries(data).reverse() : [];
                renderHistory(fullData);
            });
        }

        function renderHistory(entries) {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';
            let total = 0;
            const filter = searchInput.value.toUpperCase();

            entries.forEach(([id, item]) => {
                total += parseFloat(item.amount);
                if (item.desc.includes(filter)) {
                    const d = new Date(item.time);
                    list.innerHTML += `
                    <div class="bg-white/5 p-5 rounded-[1.8rem] border border-white/5 active-scale" onclick="window.del('${id}')">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-[11px] font-black uppercase truncate pr-4 text-slate-200">${item.desc}</p>
                            <p class="text-sm font-black ${item.amount > 0 ? 'text-blue-400' : 'text-red-500'}">${parseFloat(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                        </div>
                        <div class="text-[8px] font-black text-slate-600 uppercase tracking-widest">
                            ${d.toLocaleDateString('en-GB')} • ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
                        </div>
                    </div>`;
                }
            });
            document.getElementById('total-balance').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        const pushTrans = (isInc) => {
            const raw = amountInput.value.replace(/,/g, '');
            if(!descInput.value || !raw) {
                document.getElementById('amount-container').classList.add('error-shake');
                setTimeout(() => document.getElementById('amount-container').classList.remove('error-shake'), 300);
                return;
            }

            push(ref(db, 'shared_transactions'), { 
                desc: descInput.value.toUpperCase(), 
                amount: isInc ? Math.abs(raw) : -Math.abs(raw), 
                addedBy: auth.currentUser.email, 
                time: Date.now() 
            });

            // FEEDBACK ANIMATION
            mainBody.classList.add(isInc ? 'save-success-inc' : 'save-success-exp');
            setTimeout(() => mainBody.classList.remove('save-success-inc', 'save-success-exp'), 600);

            descInput.value = ''; amountInput.value = '';
            descInput.focus();
        };

        document.getElementById('add-income').onclick = () => pushTrans(true);
        document.getElementById('add-expense').onclick = () => pushTrans(false);
        window.del = (id) => confirm("DELETE THIS RECORD?") && remove(ref(db, `shared_transactions/${id}`));
    </script>
</body>
</html>
