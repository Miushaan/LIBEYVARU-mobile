<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MVR Elite Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #000; color: #fff; height: 100dvh; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #sidebar { 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateX(100%); width: 92%; max-width: 400px;
            padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); }
        
        .mega-amount { font-size: 6rem; line-height: 0.85; letter-spacing: -0.06em; font-weight: 900; }
        .label-text { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.5em; color: #334155; text-transform: uppercase; }

        @keyframes flash-green { 0% { background: #000; } 50% { background: #064e3b; } 100% { background: #000; } }
        @keyframes flash-red { 0% { background: #000; } 50% { background: #450a0a; } 100% { background: #000; } }
        .save-success-inc { animation: flash-green 0.6s ease-out; }
        .save-success-exp { animation: flash-red 0.6s ease-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.94); transition: 0.1s; }
        
        .tab-btn.active { color: #fff; border-bottom: 2px solid #3b82f6; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 1.25rem; rounded: 1.5rem; }
    </style>
</head>
<body id="main-body" class="flex flex-col">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/95 z-40 hidden backdrop-blur-xl"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full glass flex flex-col shadow-2xl">
        <div class="p-8 border-b border-white/5">
            <div class="flex justify-between items-center mb-6">
                <span class="label-text">Terminal Intelligence</span>
                <button id="close-sidebar" class="text-slate-600 text-4xl">&times;</button>
            </div>
            
            <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-[2rem] text-center mb-6 relative">
                <p class="label-text text-blue-500 mb-1">Net Balance</p>
                <h2 id="total-balance" class="text-3xl font-black tracking-tighter italic">0.00</h2>
            </div>

            <div class="flex gap-6 border-b border-white/5">
                <button id="tab-history" class="tab-btn active label-text pb-2 transition-all">Archive</button>
                <button id="tab-charts" class="tab-btn label-text pb-2 transition-all">Analytics</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 no-scrollbar">
            <div id="view-history" class="space-y-4">
                <input type="text" id="search-history" placeholder="FILTER ENTRIES..." 
                    class="w-full bg-slate-900/50 border border-white/5 rounded-2xl p-4 text-[10px] font-black tracking-widest outline-none mb-4">
                <div id="transaction-list" class="space-y-4"></div>
            </div>

            <div id="view-charts" class="hidden h-full flex flex-col pt-4">
                <div class="relative h-[220px] w-full mb-8">
                    <canvas id="monthlyChart"></canvas>
                </div>
                
                <p class="label-text mb-4 text-center">Monthly Breakdown</p>
                <div id="monthly-stats-container" class="space-y-4"></div>
            </div>
        </div>

        <div class="p-8 border-t border-white/5">
            <button id="logout-btn" class="label-text text-red-900/40">Close Session</button>
        </div>
    </div>

    <div id="app-container" class="flex-1 flex flex-col hidden" style="padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);">
        <div class="p-8 flex justify-between items-center">
            <div class="flex items-center gap-3 glass p-3 px-4 rounded-xl">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_green]"></div>
                <div class="text-left">
                    <p class="text-[7px] font-black text-slate-500 uppercase tracking-widest">Connected as</p>
                    <p id="dashboard-user" class="text-[9px] font-bold text-white uppercase tracking-tighter"></p>
                </div>
            </div>
            <button id="open-sidebar" class="w-16 h-16 glass rounded-[2.2rem] flex items-center justify-center active-scale">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="3" stroke-linecap="round"/></svg>
            </button>
        </div>

        <div class="flex-1 flex flex-col justify-center px-10 space-y-12">
            <div class="space-y-2">
                <p class="label-text text-center">Reference</p>
                <input type="text" id="desc" placeholder="DESCRIPTION" class="w-full bg-transparent border-b-2 border-slate-900 py-4 text-center text-2xl font-black uppercase tracking-widest text-white outline-none focus:border-blue-600">
            </div>

            <div class="space-y-2">
                <p class="label-text text-center">Amount MVR</p>
                <input type="text" id="amount" inputmode="decimal" placeholder="0" class="w-full bg-transparent text-center mega-amount text-white outline-none caret-blue-600">
            </div>

            <div class="grid grid-cols-1 gap-6 pt-4">
                <button id="add-income" class="w-full bg-blue-600 h-28 rounded-[2.5rem] font-black text-xl uppercase tracking-[0.2em] active-scale shadow-2xl shadow-blue-900/50">ADD INCOME</button>
                <button id="add-expense" class="w-full glass h-28 rounded-[2.5rem] font-black text-xl uppercase tracking-[0.2em] active-scale">ADD EXPENSE</button>
            </div>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 flex items-center justify-center p-10 bg-black z-[100]">
        <div class="w-full max-w-sm space-y-8 text-center">
            <h1 class="text-4xl font-black italic">MVR PRO</h1>
            <input type="email" id="email" placeholder="EMAIL" class="w-full p-6 bg-slate-900 rounded-3xl border border-slate-800 text-white outline-none">
            <input type="password" id="password" placeholder="PASSWORD" class="w-full p-6 bg-slate-900 rounded-3xl border border-slate-800 text-white outline-none">
            <button id="login-btn" class="w-full bg-white text-black py-6 rounded-[2rem] font-black uppercase active-scale tracking-widest">Connect</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let chart = null;
        let globalData = [];

        const tabH = document.getElementById('tab-history'), tabC = document.getElementById('tab-charts');
        const viewH = document.getElementById('view-history'), viewC = document.getElementById('view-charts');

        tabH.onclick = () => { tabH.classList.add('active'); tabC.classList.remove('active'); viewH.classList.remove('hidden'); viewC.classList.add('hidden'); };
        tabC.onclick = () => { tabC.classList.add('active'); tabH.classList.remove('active'); viewC.classList.remove('hidden'); viewH.classList.add('hidden'); updateAnalytics(); };

        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const amountInput = document.getElementById('amount'), descInput = document.getElementById('desc');

        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

        amountInput.oninput = (e) => {
            let val = e.target.value.replace(/,/g, '');
            if (!isNaN(val) && val !== "") e.target.value = Number(val).toLocaleString('en-US');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                // User Part: Dashboard Display
                document.getElementById('dashboard-user').innerText = user.email.split('@')[0];
                syncData();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function syncData() {
            onValue(ref(db, 'shared_transactions'), s => {
                const data = s.val();
                globalData = data ? Object.entries(data).reverse() : [];
                renderHistory();
                if(!viewC.classList.contains('hidden')) updateAnalytics();
            });
        }

        function renderHistory() {
            const list = document.getElementById('transaction-list');
            list.innerHTML = '';
            let total = 0;
            const search = document.getElementById('search-history').value.toUpperCase();

            globalData.forEach(([id, item]) => {
                total += parseFloat(item.amount);
                if (item.desc.includes(search)) {
                    const d = new Date(item.time);
                    // User Part: History Accountability
                    list.innerHTML += `
                    <div class="bg-white/5 p-5 rounded-[1.8rem] border border-white/5 active-scale" onclick="window.del('${id}')">
                        <div class="flex justify-between items-start mb-2 border-b border-white/5 pb-2">
                            <p class="text-[11px] font-black uppercase text-slate-200 truncate pr-3">${item.desc}</p>
                            <p class="text-xs font-bold text-slate-700 uppercase tracking-tighter">[BY ${item.addedBy.split('@')[0]}]</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <p class="text-[8px] font-black text-slate-600">${d.toLocaleDateString('en-GB')} • ${d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                            <p class="text-sm font-black ${item.amount > 0 ? 'text-blue-500' : 'text-red-500'}">${parseFloat(item.amount).toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('total-balance').innerText = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        }

        function updateAnalytics() {
            const months = {};
            globalData.forEach(([id, item]) => {
                const date = new Date(item.time);
                const key = date.toLocaleString('default', { month: 'short', year: '2-digit' });
                // User Part: Track last user per month (optional but adds context)
                if (!months[key]) months[key] = { inc: 0, exp: 0, lastUser: item.addedBy };
                if (item.amount > 0) months[key].inc += item.amount;
                else months[key].exp += Math.abs(item.amount);
                months[key].lastUser = item.addedBy; // Update last active user
            });

            const labels = Object.keys(months).reverse();
            const incData = labels.map(l => months[l].inc);
            const expData = labels.map(l => months[l].exp);
            const savedData = labels.map(l => months[l].inc - months[l].exp);

            if (chart) chart.destroy();
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { label: 'Income', data: incData, backgroundColor: '#3b82f6', borderRadius: 6 },
                        { label: 'Expense', data: expData, backgroundColor: '#ef4444', borderRadius: 6 },
                        { label: 'Saved', data: savedData, type: 'line', borderColor: '#22c55e', borderWidth: 2, pointRadius: 0, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { weight: 'bold', size: 9 } } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            const container = document.getElementById('monthly-stats-container');
            container.innerHTML = '';
            labels.forEach(l => {
                const m = months[l];
                const saved = m.inc - m.exp;
                const userInit = m.lastUser.charAt(0).toUpperCase();
                // User Part: Analytics Card Attribution
                container.innerHTML += `
                <div class="stat-card rounded-[1.5rem] bg-white/[0.03] border border-white/[0.05] p-5">
                    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                        <p class="text-[10px] font-black text-white uppercase tracking-widest">${l}</p>
                        <div class="w-5 h-5 bg-slate-800 rounded flex items-center justify-center font-bold text-slate-500 text-[9px] uppercase">${userInit}</div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <p class="text-[7px] font-black text-slate-500 uppercase">Income</p>
                            <p class="text-[10px] font-bold text-blue-500">${m.inc.toLocaleString('en-US')}</p>
                        </div>
                        <div>
                            <p class="text-[7px] font-black text-slate-500 uppercase">Expense</p>
                            <p class="text-[10px] font-bold text-red-500">${m.exp.toLocaleString('en-US')}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[7px] font-black text-slate-500 uppercase">Saved</p>
                            <p class="text-[10px] font-black ${saved >= 0 ? 'text-green-500' : 'text-orange-500'}">${saved.toLocaleString('en-US')}</p>
                        </div>
                    </div>
                </div>`;
            });
        }

        const pushTrans = (isInc) => {
            const raw = amountInput.value.replace(/,/g, '');
            if(!descInput.value || !raw) return;
            push(ref(db, 'shared_transactions'), { 
                desc: descInput.value.toUpperCase(), 
                amount: isInc ? Math.abs(raw) : -Math.abs(raw), 
                // User Part: Entry Attribution
                addedBy: auth.currentUser.email, 
                time: Date.now() 
            });
            document.getElementById('main-body').classList.add(isInc ? 'save-success-inc' : 'save-success-exp');
            setTimeout(() => document.getElementById('main-body').classList.remove('save-success-inc', 'save-success-exp'), 600);
            descInput.value = ''; amountInput.value = '';
            descInput.focus();
        };

        document.getElementById('add-income').onclick = () => pushTrans(true);
        document.getElementById('add-expense').onclick = () => pushTrans(false);
        window.del = (id) => confirm("Erase record?") && remove(ref(db, `shared_transactions/${id}`));
    </script>
</body>
</html>
