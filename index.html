<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <title>MVR Finance Shared</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .hidden { display: none; }
        .glass-dark { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neo-blue { box-shadow: 0 0 20px rgba(37, 99, 235, 0.2); }
        input::placeholder { color: #64748b; }
        .animate-slide { animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="auth-container" class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-md glass-dark p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl rotate-3">
                    <span class="text-white text-4xl font-bold -rotate-3">M</span>
                </div>
                <h2 class="text-3xl font-extrabold tracking-tight">Shared Hub</h2>
                <p class="text-slate-500 mt-2 italic text-sm">Collective MVR Tracking</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-900/50 border border-slate-800 rounded-2xl focus:border-blue-500 outline-none text-white transition-all">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900/50 border border-slate-800 rounded-2xl focus:border-blue-500 outline-none text-white transition-all">
                <button id="login-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-500 transition-all active:scale-95">Sign In</button>
                <button id="signup-btn" class="w-full text-slate-500 font-bold py-2 text-xs">Register Account</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden max-w-md mx-auto p-5">
        
        <div class="flex justify-between items-center mb-6">
            <div id="online-users-list" class="flex -space-x-2">
                </div>
            <button id="logout-btn" class="p-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-red-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" />
                </svg>
            </button>
        </div>

        <div class="bg-gradient-to-br from-blue-700 to-indigo-900 p-8 rounded-[2.5rem] shadow-2xl neo-blue mb-8 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-2">
                    <p class="text-xs uppercase tracking-widest text-blue-200 font-bold">Pooled Balance</p>
                    <div class="text-right">
                        <p id="entry-count" class="text-xl font-bold">0</p>
                        <p class="text-[10px] text-blue-300 uppercase font-bold">Entries</p>
                    </div>
                </div>
                <h2 id="total-balance" class="text-4xl font-bold tracking-tight">MVR 0.00</h2>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <section class="glass-dark p-6 rounded-[2.5rem] mb-8 border-slate-800">
            <div class="space-y-4">
                <input type="text" id="desc" placeholder="What is this for?" class="w-full p-4 bg-slate-950/50 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none text-white">
                <input type="number" id="amount" placeholder="0.00" class="w-full p-4 bg-slate-950/50 rounded-2xl border border-slate-800 focus:border-blue-500 outline-none text-2xl font-bold text-white">
                <div class="flex gap-3">
                    <button id="add-income" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all">+ Income</button>
                    <button id="add-expense" class="flex-1 bg-slate-800 text-white font-bold py-4 rounded-2xl border border-slate-700 active:scale-95 transition-all">- Expense</button>
                </div>
            </div>
        </section>

        <button id="history-toggle" class="w-full glass-dark p-5 rounded-2xl flex justify-between items-center group mb-4">
            <h3 class="font-bold text-sm tracking-wide flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                Shared Activity History
            </h3>
            <span id="toggle-icon" class="text-blue-500 transition-transform duration-300">▼</span>
        </button>
        
        <div id="history-container" class="hidden animate-slide space-y-4">
            <div id="transaction-list" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set, onDisconnect } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const authDiv = document.getElementById('auth-container');
        const appDiv = document.getElementById('app-container');
        const historyContainer = document.getElementById('history-container');
        const transactionList = document.getElementById('transaction-list');
        const userListDiv = document.getElementById('online-users-list');

        // Toggle History Logic
        document.getElementById('history-toggle').onclick = () => {
            const isHidden = historyContainer.classList.toggle('hidden');
            document.getElementById('toggle-icon').style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
        };

        // Auth
        document.getElementById('signup-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, email.value, password.value).catch(err => alert(err.message));
        };
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, email.value, password.value).catch(err => alert(err.message));
        };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authDiv.classList.add('hidden');
                appDiv.classList.remove('hidden');
                
                // Presence Setup
                const presenceRef = ref(db, 'presence/' + user.uid);
                set(presenceRef, { email: user.email, status: 'online' });
                onDisconnect(presenceRef).remove();

                loadPresence();
                loadSharedData();
            } else {
                authDiv.classList.remove('hidden');
                appDiv.classList.add('hidden');
            }
        });

        function loadPresence() {
            onValue(ref(db, 'presence'), (snap) => {
                userListDiv.innerHTML = '';
                const users = snap.val();
                if (users) {
                    Object.values(users).forEach(u => {
                        const div = document.createElement('div');
                        div.className = "w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-950 flex items-center justify-center text-xs font-bold text-blue-400";
                        div.innerText = u.email.charAt(0).toUpperCase();
                        div.title = u.email;
                        userListDiv.appendChild(div);
                    });
                }
            });
        }

        function loadSharedData() {
            onValue(ref(db, 'shared_transactions'), (snapshot) => {
                transactionList.innerHTML = '';
                let total = 0;
                let count = 0;
                const data = snapshot.val();
                
                if (data) {
                    const entries = Object.entries(data).sort((a, b) => b[1].timestamp - a[1].timestamp);
                    count = entries.length;

                    entries.forEach(([id, item]) => {
                        const val = parseFloat(item.amount);
                        total += val;
                        
                        const div = document.createElement('div');
                        div.className = "glass-dark p-5 rounded-2xl flex justify-between items-center animate-slide";
                        div.innerHTML = `
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-900 border border-slate-800 ${val > 0 ? 'text-green-400' : 'text-red-400'} font-black text-xs">
                                    ${val > 0 ? 'IN' : 'OUT'}
                                </div>
                                <div>
                                    <p class="font-bold text-white text-sm leading-tight">${item.desc}</p>
                                    <p class="text-[9px] font-bold text-slate-500 mt-1 uppercase tracking-wider">${item.addedBy.split('@')[0]} • ${new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="font-extrabold text-sm ${val > 0 ? 'text-green-400' : 'text-slate-100'}">
                                    ${val > 0 ? '+' : ''}${val.toFixed(2)}
                                </p>
                                <button onclick="deleteItem('${id}')" class="text-[9px] font-bold text-slate-600 hover:text-red-500 uppercase mt-1">Delete</button>
                            </div>
                        `;
                        transactionList.appendChild(div);
                    });
                }
                document.getElementById('total-balance').innerText = `MVR ${total.toLocaleString('en-MV', {minimumFractionDigits: 2})}`;
                document.getElementById('entry-count').innerText = count;
            });
        }

        window.deleteItem = (id) => {
            if(confirm("Delete this shared entry?")) {
                remove(ref(db, `shared_transactions/${id}`));
            }
        };

        const addTransaction = (isIncome) => {
            const amountInput = document.getElementById('amount');
            const descInput = document.getElementById('desc');
            const val = parseFloat(amountInput.value);
            
            if(!val || !descInput.value) return;

            push(ref(db, 'shared_transactions'), {
                desc: descInput.value,
                amount: isIncome ? Math.abs(val) : -Math.abs(val),
                addedBy: auth.currentUser.email,
                timestamp: Date.now()
            });

            amountInput.value = '';
            descInput.value = '';
        };

        document.getElementById('add-income').onclick = () => addTransaction(true);
        document.getElementById('add-expense').onclick = () => addTransaction(false);
    </script>
</body>
</html>
