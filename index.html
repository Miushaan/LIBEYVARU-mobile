<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MVR Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #020617; color: #f8fafc; height: 100dvh; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Layout Fixes */
        #sidebar { transition: transform 0.4s ease; transform: translateX(100%); width: 280px; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); z-index: 50; }
        #sidebar.open { transform: translateX(0); }
        
        #update-popup { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); z-index: 60; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
        #update-popup.open { transform: translateY(0); }

        .log-entry { border-left: 2px solid #3b82f6; padding-left: 1rem; margin-bottom: 1.5rem; position: relative; }
        .log-dot { position: absolute; left: -5px; top: 0; width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; box-shadow: 0 0 10px #3b82f6; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.96); transition: 0.1s; }
        input { font-size: 16px !important; } /* Prevents iOS zoom */
    </style>
</head>
<body class="flex flex-col">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-40 hidden backdrop-blur-sm"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full glass flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500">Navigation</span>
            <button id="close-sidebar" class="text-slate-500 text-2xl px-2">&times;</button>
        </div>
        <div class="p-5 space-y-4">
            <button id="open-updates-btn" class="w-full bg-slate-900/50 border border-white/5 p-5 rounded-[1.5rem] flex items-center gap-4 active-scale">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <div class="text-left">
                    <p class="text-[11px] font-bold text-white uppercase">User Updates</p>
                    <p class="text-[9px] text-slate-500 font-black">VIEW LIVE LOGS</p>
                </div>
            </button>
            <div id="online-list" class="space-y-2 pt-4 border-t border-white/5"></div>
        </div>
        <button id="logout-btn" class="mt-auto p-8 text-[10px] font-black uppercase tracking-widest text-slate-700">Disconnect</button>
    </div>

    <div id="update-popup" class="fixed inset-0 glass flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-950/50">
            <div>
                <h3 class="font-black text-[10px] uppercase tracking-[0.4em] text-white">System Logs</h3>
                <p class="text-[8px] text-blue-500 font-bold mt-1">LATEST ON TOP</p>
            </div>
            <button id="close-updates-popup" class="w-10 h-10 glass rounded-full flex items-center justify-center text-xl">&times;</button>
        </div>
        <div id="update-logs" class="flex-1 overflow-y-auto p-6 no-scrollbar"></div>
        
        <div class="p-4 bg-slate-950 border-t border-white/10 flex gap-2">
            <input type="text" id="log-input" placeholder="Type system log..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-4 text-sm text-white outline-none">
            <button id="send-log" class="bg-blue-600 px-6 rounded-xl font-black text-[10px] uppercase active-scale">Post</button>
        </div>
    </div>

    <div id="app-container" class="flex-1 flex flex-col hidden" style="padding-top: var(--safe-top);">
        <div class="p-6 flex justify-end">
            <button id="open-sidebar" class="w-12 h-12 glass rounded-2xl flex flex-col items-center justify-center gap-1.5 active-scale shadow-lg">
                <div class="w-5 h-0.5 bg-slate-200"></div>
                <div class="w-5 h-0.5 bg-slate-200"></div>
            </button>
        </div>

        <div class="px-6 flex-1 overflow-y-auto no-scrollbar space-y-6">
            <div class="glass p-10 rounded-[2.5rem] text-center shadow-2xl border-white/5">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.3em] mb-2">Net Balance</p>
                <h2 id="total-balance" class="text-5xl font-black tracking-tighter text-white">0.00</h2>
            </div>

            <div class="space-y-4 bg-slate-900/30 p-6 rounded-[2.5rem] border border-white/5 shadow-inner">
                <input type="text" id="desc" placeholder="DESCRIPTION" class="w-full bg-transparent border-b border-slate-800 p-3 text-center text-[10px] uppercase font-black tracking-widest text-slate-400 outline-none">
                <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="w-full bg-transparent text-center text-5xl font-black text-white outline-none">
                <div class="flex gap-4 pt-4">
                    <button id="add-income" class="flex-1 bg-blue-600 py-5 rounded-2xl font-black uppercase text-[10px] active-scale shadow-lg shadow-blue-900/30">Income</button>
                    <button id="add-expense" class="flex-1 glass py-5 rounded-2xl font-black uppercase text-[10px] active-scale">Expense</button>
                </div>
            </div>

            <div id="transaction-list" class="space-y-3 pb-12"></div>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 flex items-center justify-center p-6 glass">
        <div class="w-full max-w-sm p-10 rounded-[3rem] space-y-4 text-center">
            <h1 class="font-black text-xl tracking-widest text-white mb-6">MVR PRO</h1>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white outline-none">
            <button id="login-btn" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase text-[11px] active-scale">Authorize</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set, onDisconnect, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM
        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const updatePopup = document.getElementById('update-popup'), logList = document.getElementById('update-logs');
        const transList = document.getElementById('transaction-list');

        // Navigation
        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); updatePopup.classList.remove('open'); overlay.classList.add('hidden'); };
        document.getElementById('open-updates-btn').onclick = () => { updatePopup.classList.add('open'); sidebar.classList.remove('open'); };
        document.getElementById('close-updates-popup').onclick = () => { updatePopup.classList.remove('open'); overlay.classList.add('hidden'); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                set(ref(db, `presence/${user.uid}`), { email: user.email, active: true });
                onDisconnect(ref(db, `presence/${user.uid}`)).remove();
                initSync();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(err => alert(err.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function initSync() {
            // New Independent Node: system_logs
            onValue(query(ref(db, 'system_logs'), limitToLast(30)), s => {
                logList.innerHTML = '';
                const data = s.val();
                if(data) {
                    Object.entries(data).reverse().forEach(([id, m]) => {
                        const time = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        logList.innerHTML += `
                        <div class="log-entry">
                            <div class="log-dot"></div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-black text-blue-500 uppercase">${m.user.split('@')[0]}</span>
                                <span class="text-[8px] font-bold text-slate-700">${time}</span>
                            </div>
                            <p class="text-[12px] text-slate-300 font-medium">${m.text}</p>
                        </div>`;
                    });
                } else {
                    logList.innerHTML = '<p class="text-[10px] text-slate-800 text-center py-20 font-black uppercase">Log Terminal Empty</p>';
                }
            });

            // Independent Node: shared_transactions
            onValue(ref(db, 'shared_transactions'), s => {
                transList.innerHTML = '';
                let total = 0;
                const data = s.val();
                if(data) {
                    Object.entries(data).reverse().forEach(([id, item]) => {
                        total += parseFloat(item.amount);
                        transList.innerHTML += `
                        <div class="glass p-5 rounded-[1.5rem] flex justify-between items-center border-white/5">
                            <div>
                                <p class="text-[11px] font-black text-white uppercase tracking-tighter">${item.desc}</p>
                                <p class="text-[8px] text-slate-600 font-black uppercase">${item.addedBy.split('@')[0]}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-sm font-black ${item.amount > 0 ? 'text-green-500' : 'text-red-500'}">${item.amount > 0 ? '+' : ''}${parseFloat(item.amount).toFixed(2)}</p>
                                <button onclick="window.del('${id}')" class="text-[7px] text-slate-800 font-black uppercase">DELETE</button>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('total-balance').innerText = total.toLocaleString('en-MV', {minimumFractionDigits: 2});
            });

            // Presence
            onValue(ref(db, 'presence'), s => {
                const list = document.getElementById('online-list'); list.innerHTML = '';
                Object.values(s.val() || {}).forEach(u => {
                    list.innerHTML += `<div class="flex items-center gap-2 p-1"><div class="w-1 h-1 bg-green-500 rounded-full"></div><span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">${u.email.split('@')[0]}</span></div>`;
                });
            });
        }

        document.getElementById('send-log').onclick = () => {
            const input = document.getElementById('log-input');
            if(input.value.trim()) {
                push(ref(db, 'system_logs'), { user: auth.currentUser.email, text: input.value, time: Date.now() });
                input.value = '';
            }
        };

        window.del = (id) => confirm("Erase Log?") && remove(ref(db, `shared_transactions/${id}`));

        const pushTrans = (isInc) => {
            const d = document.getElementById('desc'), a = document.getElementById('amount');
            if(!d.value || !a.value) return;
            push(ref(db, 'shared_transactions'), { 
                desc: d.value.toUpperCase(), 
                amount: isInc ? Math.abs(a.value) : -Math.abs(a.value), 
                addedBy: auth.currentUser.email, 
                time: Date.now() 
            });
            d.value = ''; a.value = '';
        };

        document.getElementById('add-income').onclick = () => pushTrans(true);
        document.getElementById('add-expense').onclick = () => pushTrans(false);
    </script>
</body>
</html>
