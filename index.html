<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MVR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #020617; 
            color: #f8fafc; 
            height: 100dvh; 
            overflow: hidden;
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #sidebar { transition: transform 0.3s ease-in-out; transform: translateX(100%); z-index: 50; }
        #sidebar.open { transform: translateX(0); }
        #chat-popup { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); z-index: 60; }
        #chat-popup.open { transform: translateY(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, button { outline: none; -webkit-tap-highlight-color: transparent; }
        .active-scale:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col items-center">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full w-72 glass flex flex-col shadow-2xl">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Menu</span>
            <button id="close-sidebar" class="text-2xl text-slate-500">&times;</button>
        </div>
        <div class="p-4 space-y-4">
            <button id="open-chat-btn" class="w-full glass p-4 rounded-2xl flex items-center gap-4 active-scale border-blue-500/30">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                </div>
                <div class="text-left">
                    <p class="text-xs font-bold text-white">Live Chat</p>
                    <p class="text-[9px] text-slate-500 uppercase">Connect with others</p>
                </div>
            </button>
            <div id="online-list" class="space-y-2 pt-4 border-t border-white/5"></div>
        </div>
        <button id="logout-btn" class="mt-auto p-6 text-[10px] font-black uppercase tracking-widest text-red-500/50">Sign Out</button>
    </div>

    <div id="chat-popup" class="fixed inset-0 glass flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-900/50">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <h3 class="font-black text-sm uppercase tracking-widest">Global Chat</h3>
            </div>
            <button id="close-chat-popup" class="w-10 h-10 glass rounded-full flex items-center justify-center text-xl">&times;</button>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
        <div id="typing-indicator" class="px-6 py-1 h-5 text-[10px] text-blue-400 italic"></div>
        <div class="p-4 pb-8 bg-slate-950 border-t border-white/5 flex gap-2">
            <input type="text" id="chat-input" placeholder="Message..." class="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-sm text-white">
            <button id="send-chat" class="bg-blue-600 px-6 rounded-2xl font-bold active-scale">Send</button>
        </div>
    </div>

    <div id="app-container" class="w-full max-w-md flex flex-col h-full hidden">
        <div class="p-6 flex justify-end">
            <button id="open-sidebar" class="w-12 h-12 glass rounded-2xl flex flex-col items-center justify-center gap-1.5 active-scale">
                <div class="w-5 h-0.5 bg-slate-300"></div>
                <div class="w-5 h-0.5 bg-slate-300"></div>
            </button>
        </div>

        <div class="px-6 flex-1 overflow-y-auto no-scrollbar space-y-6">
            <div class="glass p-12 rounded-[3rem] text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-blue-600"></div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Total Balance</p>
                <h2 id="total-balance" class="text-5xl font-black tracking-tighter">0.00</h2>
            </div>

            <div class="space-y-4">
                <input type="text" id="desc" placeholder="What's this for?" class="w-full bg-transparent border-b border-slate-800 p-3 text-center text-sm">
                <input type="number" id="amount" inputmode="decimal" placeholder="0.00" class="w-full bg-transparent text-center text-5xl font-black placeholder-slate-800">
                <div class="flex gap-4 pt-4">
                    <button id="add-income" class="flex-1 bg-blue-600 py-5 rounded-[2rem] font-black shadow-xl shadow-blue-900/20 active-scale">Income</button>
                    <button id="add-expense" class="flex-1 glass py-5 rounded-[2rem] font-black active-scale">Expense</button>
                </div>
            </div>

            <div id="transaction-list" class="space-y-3 pb-12 pt-6"></div>
        </div>
    </div>

    <div id="auth-container" class="flex-1 flex items-center justify-center p-6 w-full max-w-sm">
        <div class="w-full glass p-10 rounded-[3rem] space-y-4 text-center">
            <div class="w-16 h-1 w-12 bg-blue-600 mx-auto mb-8 rounded-full"></div>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 text-white">
            <button id="login-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-bold shadow-lg active-scale">Access System</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set, onDisconnect, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // UI Selectors
        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const chatPopup = document.getElementById('chat-popup'), chatMsgs = document.getElementById('chat-messages');

        // Sidebar Actions
        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

        // Chat Popup Actions
        document.getElementById('open-chat-btn').onclick = () => { chatPopup.classList.add('open'); sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        document.getElementById('close-chat-popup').onclick = () => chatPopup.classList.remove('open');

        // Logic
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                set(ref(db, `presence/${user.uid}`), { email: user.email });
                onDisconnect(ref(db, `presence/${user.uid}`)).remove();
                startSync();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(alert);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function startSync() {
            // Online List
            onValue(ref(db, 'presence'), s => {
                const list = document.getElementById('online-list'); list.innerHTML = '';
                Object.values(s.val() || {}).forEach(u => {
                    list.innerHTML += `<div class="flex items-center gap-3 p-2"><div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div><span class="text-[10px] font-bold text-slate-300 uppercase">${u.email.split('@')[0]}</span></div>`;
                });
            });

            // Transactions
            onValue(ref(db, 'shared_transactions'), s => {
                const list = document.getElementById('transaction-list'); list.innerHTML = '';
                let total = 0;
                const entries = s.val() ? Object.entries(s.val()).reverse() : [];
                entries.forEach(([id, item]) => {
                    total += parseFloat(item.amount);
                    list.innerHTML += `<div class="glass p-4 rounded-2xl flex justify-between items-center"><div class="text-xs font-bold text-white">${item.desc}<p class="text-[8px] text-slate-600 uppercase tracking-tighter">${item.addedBy.split('@')[0]}</p></div><div class="text-right"><p class="text-xs font-black ${item.amount > 0 ? 'text-green-500' : 'text-red-500'}">${item.amount > 0 ? '+' : ''}${parseFloat(item.amount).toFixed(2)}</p><button onclick="window.del('${id}')" class="text-[7px] text-slate-800 uppercase font-black">Delete</button></div></div>`;
                });
                document.getElementById('total-balance').innerText = total.toLocaleString('en-MV', {minimumFractionDigits: 2});
            });

            // Chat Messages
            onValue(query(ref(db, 'chat_messages'), limitToLast(50)), s => {
                chatMsgs.innerHTML = '';
                if(s.val()) {
                    Object.values(s.val()).forEach(m => {
                        const isMe = m.user === auth.currentUser.email;
                        chatMsgs.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}"><span class="text-[8px] font-bold text-slate-600 uppercase mb-1 px-1">${m.user.split('@')[0]}</span><div class="${isMe ? 'bg-blue-600 text-white' : 'bg-white/5 text-slate-300'} p-3 rounded-2xl max-w-[85%] text-xs">${m.text}</div></div>`;
                    });
                    chatMsgs.scrollTop = chatMsgs.scrollHeight;
                }
            });

            // Typing Indicator
            const cin = document.getElementById('chat-input');
            cin.oninput = () => set(ref(db, `typing/${auth.currentUser.uid}`), { name: auth.currentUser.email.split('@')[0], typing: cin.value.length > 0 });
            onValue(ref(db, 'typing'), s => {
                const typers = Object.values(s.val() || {}).filter(t => t.typing && t.name !== auth.currentUser.email.split('@')[0]).map(t => t.name);
                document.getElementById('typing-indicator').innerText = typers.length ? `${typers[0]} is typing...` : '';
            });
        }

        document.getElementById('send-chat').onclick = () => {
            const cin = document.getElementById('chat-input');
            if(cin.value) push(ref(db, 'chat_messages'), { user: auth.currentUser.email, text: cin.value, time: Date.now() });
            cin.value = ''; set(ref(db, `typing/${auth.currentUser.uid}`), { typing: false });
        };

        const pushData = (isInc) => {
            const d = document.getElementById('desc'), a = document.getElementById('amount');
            if(!d.value || !a.value) return;
            push(ref(db, 'shared_transactions'), { desc: d.value, amount: isInc ? Math.abs(a.value) : -Math.abs(a.value), addedBy: auth.currentUser.email, time: Date.now() });
            d.value = ''; a.value = '';
        };

        document.getElementById('add-income').onclick = () => pushData(true);
        document.getElementById('add-expense').onclick = () => pushData(false);
        window.del = (id) => confirm("Delete entry?") && remove(ref(db, `shared_transactions/${id}`));
    </script>
</body>
</html>
