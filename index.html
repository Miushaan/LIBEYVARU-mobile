<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MVR Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            height: 100dvh; 
            overflow: hidden; 
            margin: 0;
        }
        .glass { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Sidebar: Now houses Balance & History */
        #sidebar { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateX(100%); 
            width: 85%; 
            max-width: 340px;
            padding-top: var(--safe-top); 
            padding-bottom: var(--safe-bottom); 
            z-index: 50; 
        }
        #sidebar.open { transform: translateX(0); }
        
        /* Typography Scale */
        .huge-text { font-size: 5rem; line-height: 1; letter-spacing: -0.05em; }
        .label-text { font-size: 0.75rem; font-weight: 900; letter-spacing: 0.3em; color: #64748b; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-scale:active { transform: scale(0.94); transition: 0.1s; }
        
        /* Input overrides for larger feel */
        input::placeholder { color: #1e293b; }
        input { font-size: 20px !important; } /* Prevents iOS zoom and feels bigger */
    </style>
</head>
<body class="flex flex-col">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/90 z-40 hidden backdrop-blur-md"></div>

    <div id="sidebar" class="fixed top-0 right-0 h-full glass flex flex-col shadow-2xl">
        <div class="p-8 border-b border-white/5">
            <div class="flex justify-between items-center mb-8">
                <span class="label-text">DASHBOARD</span>
                <button id="close-sidebar" class="text-slate-500 text-3xl px-2">&times;</button>
            </div>
            
            <div class="bg-blue-600/10 border border-blue-500/20 p-6 rounded-[2rem] text-center">
                <p class="label-text text-blue-500 mb-2">NET BALANCE</p>
                <h2 id="total-balance" class="text-3xl font-black tracking-tighter text-white">0.00</h2>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 no-scrollbar">
            <p class="label-text mb-4 px-2">TRANSACTION HISTORY</p>
            <div id="transaction-list" class="space-y-3"></div>
        </div>

        <div class="p-8 border-t border-white/5">
            <div id="online-list" class="mb-6 space-y-2"></div>
            <button id="logout-btn" class="label-text text-red-500/50 hover:text-red-500">TERMINATE SESSION</button>
        </div>
    </div>

    <div id="app-container" class="flex-1 flex flex-col hidden" style="padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);">
        <div class="p-8 flex justify-between items-center">
            <h1 class="label-text text-white">ENTRY TERMINAL</h1>
            <button id="open-sidebar" class="w-14 h-14 glass rounded-[1.5rem] flex flex-col items-center justify-center gap-2 active-scale">
                <div class="w-6 h-1 bg-white rounded-full"></div>
                <div class="w-6 h-1 bg-white rounded-full opacity-50"></div>
            </button>
        </div>

        <div class="flex-1 flex flex-col justify-center px-8 space-y-12">
            <div class="space-y-2">
                <p class="label-text text-center">IDENTIFIER</p>
                <input type="text" id="desc" placeholder="WHAT IS THIS FOR?" 
                    class="w-full bg-transparent border-b-2 border-slate-900 py-4 text-center text-xl font-black uppercase tracking-widest text-white outline-none focus:border-blue-600 transition-colors">
            </div>

            <div class="space-y-2">
                <p class="label-text text-center">AMOUNT MVR</p>
                <input type="number" id="amount" inputmode="decimal" placeholder="0.00" 
                    class="w-full bg-transparent text-center huge-text font-black text-white outline-none placeholder-slate-900">
            </div>

            <div class="grid grid-cols-1 gap-4 pt-8">
                <button id="add-income" class="w-full bg-blue-600 h-24 rounded-[2rem] font-black text-lg uppercase tracking-widest active-scale shadow-2xl shadow-blue-900/40">
                    (+) Add Income
                </button>
                <button id="add-expense" class="w-full glass h-24 rounded-[2rem] font-black text-lg uppercase tracking-widest active-scale">
                    (-) Add Expense
                </button>
            </div>
        </div>
    </div>

    <div id="auth-container" class="fixed inset-0 flex items-center justify-center p-8 bg-black z-[100]">
        <div class="w-full max-w-sm space-y-6 text-center">
            <div class="huge-text font-black text-blue-600 mb-12">MVR</div>
            <input type="email" id="email" placeholder="EMAIL" class="w-full p-6 bg-slate-900 rounded-3xl border border-slate-800 text-white font-bold outline-none">
            <input type="password" id="password" placeholder="PASSWORD" class="w-full p-6 bg-slate-900 rounded-3xl border border-slate-800 text-white font-bold outline-none">
            <button id="login-btn" class="w-full bg-white text-black py-6 rounded-3xl font-black uppercase tracking-widest active-scale">Unlock System</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, remove, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCt9BX2aarll7Epwdl83XsrxeNgwzFzvHk",
            authDomain: "srdportal.firebaseapp.com",
            databaseURL: "https://srdportal-default-rtdb.firebaseio.com",
            projectId: "srdportal",
            storageBucket: "srdportal.firebasestorage.app",
            messagingSenderId: "547975504662",
            appId: "1:547975504662:web:8297d6499c61a79655e637"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
        const transList = document.getElementById('transaction-list');

        document.getElementById('open-sidebar').onclick = () => { sidebar.classList.add('open'); overlay.classList.remove('hidden'); };
        document.getElementById('close-sidebar').onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };
        overlay.onclick = () => { sidebar.classList.remove('open'); overlay.classList.add('hidden'); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                set(ref(db, `presence/${user.uid}`), { email: user.email });
                onDisconnect(ref(db, `presence/${user.uid}`)).remove();
                syncData();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, email.value, password.value).catch(e => alert(e.message));
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        function syncData() {
            // Transactions & Balance in Sidebar
            onValue(ref(db, 'shared_transactions'), s => {
                transList.innerHTML = '';
                let total = 0;
                const data = s.val();
                if(data) {
                    Object.entries(data).reverse().forEach(([id, item]) => {
                        total += parseFloat(item.amount);
                        transList.innerHTML += `
                        <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                            <div class="max-w-[150px]">
                                <p class="text-[10px] font-black text-white uppercase truncate">${item.desc}</p>
                                <p class="text-[8px] text-slate-500 font-bold uppercase mt-1">${item.addedBy.split('@')[0]}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-black ${item.amount > 0 ? 'text-blue-400' : 'text-red-500'}">${item.amount > 0 ? '+' : ''}${parseFloat(item.amount).toFixed(2)}</p>
                                <button onclick="window.del('${id}')" class="text-[8px] text-slate-700 font-black uppercase mt-1">Delete</button>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('total-balance').innerText = total.toLocaleString('en-MV', {minimumFractionDigits: 2});
            });

            // Online Users
            onValue(ref(db, 'presence'), s => {
                const list = document.getElementById('online-list'); list.innerHTML = '';
                Object.values(s.val() || {}).forEach(u => {
                    list.innerHTML += `<div class="flex items-center gap-2"><div class="w-1 h-1 bg-blue-500 rounded-full"></div><span class="text-[9px] font-black text-slate-500 uppercase">${u.email.split('@')[0]}</span></div>`;
                });
            });
        }

        const pushTrans = (isInc) => {
            const d = document.getElementById('desc'), a = document.getElementById('amount');
            if(!d.value || !a.value) return;
            push(ref(db, 'shared_transactions'), { 
                desc: d.value.toUpperCase(), 
                amount: isInc ? Math.abs(a.value) : -Math.abs(a.value), 
                addedBy: auth.currentUser.email, 
                time: Date.now() 
            });
            d.value = ''; a.value = '';
        };

        document.getElementById('add-income').onclick = () => pushTrans(true);
        document.getElementById('add-expense').onclick = () => pushTrans(false);
        window.del = (id) => confirm("Remove Entry?") && remove(ref(db, `shared_transactions/${id}`));
    </script>
</body>
</html>
